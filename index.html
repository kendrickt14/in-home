<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Load Roboto (Google's UI Font) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <title>INHOME</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --glass-card: rgba(15, 25, 55, 0.5);
            --glass-border: rgba(100, 150, 250, 0.2);
            --text-main: #FFFFFF;
            --text-sub: #FFFFFF;
            --bg-base: #0B132B;
            --text-glow: 0 2px 8px rgba(0, 0, 0, 0.8);
            --sans-serif-stack: 'Roboto', 'Chiron GoRound TC', system-ui, sans-serif;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html { font-size: 15px; transition: font-size 0.3s ease; }
        html, body { 
            margin: 0; padding: 0; height: 100dvh; width: 100vw; 
            overflow: hidden; user-select: none; -webkit-user-select: none; 
        }

        body {
            font-family: var(--sans-serif-stack);
            padding: 24px;
            color: var(--text-main);
            background-color: var(--bg-base);
            display: flex; flex-direction: column; cursor: pointer; 
        }

        /* Backgrounds */
        .bg-slide-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; }
        .bg-slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; 
        }
        .bg-slide.active { opacity: 0.85; } 
        .bg-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.05) 0%, rgba(7, 11, 18, 0.45) 100%); z-index: -1; 
        }

        /* HUD Header */
        .dashboard-header { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); 
            text-shadow: var(--text-glow); flex-shrink: 0; transition: opacity 0.4s; 
        }
        .clock-box { display: flex; flex-direction: column; }
        #liveTime { font-size: clamp(3rem, 7vw, 5rem); font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
        #liveDate { font-size: clamp(1rem, 2.5vw, 1.5rem); font-weight: 600; margin-top: 8px; letter-spacing: 0.02em; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .weather-box { display: flex; align-items: center; gap: 12px; }
        #weatherIcon { width: 42px; height: 42px; display: none; }
        #temperature { font-size: 2rem; font-weight: 600; text-shadow: var(--text-glow); }
        #weatherWarnings { display: flex; flex-direction: row; align-items: center; gap: 6px; }

        .settings-btn { 
            background: transparent; border: none; color: var(--text-main); 
            font-size: 1.8rem; cursor: pointer; opacity: 0.15; transition: opacity 0.2s; 
        }
        .settings-btn:hover { opacity: 1; }

        .settings-drawer {
            background: rgba(11, 19, 43, 0.98); border: 1px solid var(--glass-border); 
            backdrop-filter: blur(20px); border-radius: 12px; padding: 20px; display: none; 
            position: absolute; top: 80px; right: 24px; z-index: 100; width: 340px; max-height: 70vh; overflow-y: auto;
        }

        .layout-btn, .action-btn { 
            background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); 
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; 
        }
        .layout-btn { flex: 1; }
        .layout-btn.active { background: #3b82f6; border-color: #60a5fa; }
        .action-btn:hover { background: rgba(255,255,255,0.2); }
        .input-field { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; 
            padding: 8px 12px; border-radius: 6px; width: 100%; margin-bottom: 8px; 
        }

        /* Main Grid */
        .grid-layout { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #pageWrapper { display: flex; flex-direction: column; gap: 12px; width: 100%; height: 100%; transition: opacity 0.4s; }
        #pageWrapper.dimmed { opacity: 0; }

        /* Center Page Styles */
        .center-layout { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; text-shadow: var(--text-glow); text-align: center; 
        }
        #centerLiveTime { font-size: clamp(5rem, 15vw, 10rem); font-weight: 600; line-height: 1; letter-spacing: -0.03em; }
        #centerLiveDate { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 600; margin-top: 15px; }
        .center-weather-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; }
        #centerWeatherWarnings { display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* Weather Forecast Specifics */
        .forecast-card { 
            background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 15px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            flex: 1; min-width: 140px; backdrop-filter: blur(10px); 
        }
        .fc-date { font-size: clamp(0.9rem, 2vw, 1.3rem); font-weight: 600; margin-bottom: 2px; line-height: 1.1; color: #FFFFFF; }
        .fc-week { font-size: clamp(0.8rem, 1.8vw, 1.1rem); font-weight: 500; margin-bottom: 10px; color: #FFFFFF; }
        .fc-icon { width: clamp(35px, 6vw, 50px); height: auto; margin-bottom: 10px; }
        .fc-temp { font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 600; color: #FFFFFF; }

        /* Hourly Weather Specifics */
        .hourly-card { 
            background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 16px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            flex: 1; min-width: 120px; backdrop-filter: blur(12px); 
        }
        .hc-time { font-size: clamp(1rem, 2.2vw, 1.3rem); font-weight: 600; margin-bottom: 8px; color: #FFFFFF; text-shadow: var(--text-glow); }
        .hc-icon { font-size: clamp(2.2rem, 5.5vw, 3.5rem); margin: 6px 0 10px 0; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .hc-temp { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 600; color: #FFFFFF; margin-bottom: 8px; text-shadow: var(--text-glow); }
        .hc-rain { font-size: clamp(0.85rem, 1.8vw, 1.1rem); font-weight: 600; color: #93C5FD; background: rgba(30, 58, 138, 0.45); border: 1px solid rgba(96, 165, 250, 0.3); padding: 4px 10px; border-radius: 12px; }

        /* Stock Page Specifics */
        .stock-symbol { font-size: clamp(2rem, 5vw, 4rem); font-weight: 600; letter-spacing: 0.05em; color: #FFFFFF; }
        .stock-price { font-size: clamp(6rem, 15vw, 11rem); font-weight: 600; line-height: 1; margin: 10px 0; color: #FFFFFF; }
        .stock-change { font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 600; }
        .color-up { color: #6EE7B7; } 
        .color-down { color: #FDA4AF; } 
        .color-flat { color: #FFFFFF; }

        /* News Page Specifics */
        .news-title-row { 
            font-size: clamp(1.5rem, 3.5vw, 2.4rem); font-weight: 600; line-height: 1.4; width: 100%; 
            background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 18px 28px; margin-bottom: 8px; backdrop-filter: blur(14px); 
            text-align: left; text-shadow: var(--text-glow); color: #FFFFFF;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; word-break: break-word;
        }

        /* Bus Cards */
        .kiosk-card-route { 
            background: var(--glass-card); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); 
            border-radius: 16px; padding: 1rem 1.5rem; 
            display: flex; align-items: center; justify-content: space-between; gap: 20px; 
        }
        .route-ident-block { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .route-badge { 
            color: #FFFFFF !important; 
            font-weight: 600; font-size: clamp(2.5rem, 6vw, 3.5rem); line-height: 0.9; 
            width: 160px; text-align: center; padding: 0; background: none; flex-shrink: 0; 
        }
        .dest-col { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .dest-tc { font-size: 1.6rem; font-weight: 600; white-space: nowrap; color: #FFFFFF; } 
        .dest-en { font-size: 1rem; white-space: nowrap; color: #FFFFFF; opacity: 1; }
        .stop-spec-box { margin-top: 4px; font-size: 0.85rem; color: #FFFFFF; opacity: 1; }

        /* Aligned 2-Row Timeline */
        .arrivals-timeline { 
            display: flex; align-items: center; gap: 12px; overflow-x: auto; 
            padding: 10px 0; -webkit-overflow-scrolling: touch; 
        }
        .arrival-node { 
            background: rgba(0, 0, 0, 0.35); border: 1px solid var(--glass-border); border-radius: 12px; 
            padding: 12px; min-width: 140px; text-align: center; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .arrival-node:first-child { background: rgba(16, 185, 129, 0.25); border: 1px solid rgba(52, 211, 153, 0.5); }
        .arrival-node.imminent { background: rgba(220, 38, 38, 0.35) !important; border: 1px solid rgba(248, 113, 113, 0.6) !important; animation: pulse 1.5s infinite; }
        
        .node-mins { font-size: 1.2rem; font-weight: 600; text-shadow: var(--text-glow); line-height: 1.2; margin-bottom: 6px; display: block; white-space: nowrap; color: #FFFFFF; }
        .node-clock { font-size: 0.95rem; font-weight: 600; line-height: 1; display: block; color: #FFFFFF; }

        .arrival-node:first-child .node-mins { color: #FFFFFF; }
        .arrival-node.imminent .node-mins { color: #FFFFFF; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* --- MOBILE & PHONE SPECIFIC ENHANCEMENTS --- */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; }
            .header-right { width: 100%; justify-content: space-between; }
            #temperature { font-size: 1.5rem; }
            .settings-drawer { width: calc(100vw - 24px); right: 12px; top: 70px; }
            
            .kiosk-card-route { flex-direction: column; align-items: stretch; gap: 10px; padding: 0.8rem 1rem; }
            .route-ident-block { width: 100%; gap: 12px; justify-content: flex-start; }
            .route-badge { width: 105px; text-align: left; font-size: 2.2rem; }
            .dest-tc { font-size: 1.3rem; }
            .arrivals-timeline { width: 100%; justify-content: flex-start; padding: 4px 0; }
            .arrival-node { min-width: 115px; padding: 10px 8px; }
            
            .forecast-card { min-width: 110px; padding: 12px 8px; }
            .hourly-card { min-width: 100px; padding: 12px 6px; }
            .news-title-row { width: 100%; padding: 14px 18px; margin-bottom: 8px; font-size: clamp(1.25rem, 4.5vw, 1.7rem); }
        }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div class="bg-slide-container" id="bgSlideContainer"></div>
    <div class="bg-overlay"></div>

    <div class="dashboard-header" id="mainHeader" onclick="event.stopPropagation()">
        <div class="clock-box">
            <div id="liveTime">00:00</div>
            <div id="liveDate">Loading...</div>
        </div>
        <div class="header-right">
            <button id="installBtn" class="settings-btn" style="display:none;" title="Install Dashboard">📲</button>
            <div class="weather-box">
                <div id="weatherWarnings"></div>
                <img id="weatherIcon" src="" alt="Weather" />
                <div id="temperature">--°C</div>
            </div>
            <button class="settings-btn" onclick="toggleSettingsDrawer()">⚙️</button>
        </div>
    </div>

    <div id="settingsDrawer" class="settings-drawer" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; font-weight: 600; color: #FFFFFF;">INHOME Settings</h3>
        
        <div style="margin-bottom: 20px;">
            <p style="font-size:0.85rem; color:#FFFFFF; margin: 0 0 8px 0;">Layout Size</p>
            <div style="display:flex; gap: 8px;">
                <button id="btnSizeSmall" onclick="setLayoutSize('small')" class="layout-btn">Small</button>
                <button id="btnSizeMedium" onclick="setLayoutSize('medium')" class="layout-btn">Med</button>
                <button id="btnSizeLarge" onclick="setLayoutSize('large')" class="layout-btn">Large</button>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <p style="font-size:0.85rem; color:#FFFFFF; margin: 0 0 8px 0;">Stock Tracker</p>
            <div style="display:flex; gap: 8px; margin-bottom: 10px;">
                <input type="text" id="stockInput" class="input-field" placeholder="e.g. 0005.HK" style="margin-bottom:0;" />
                <button onclick="addStock()" class="action-btn" style="background:#10b981; border:none;">Add</button>
            </div>
            <div id="stockList" style="display:flex; flex-direction:column; gap:6px; max-height: 120px; overflow-y: auto;"></div>
        </div>

        <div style="margin-bottom: 10px;">
            <p style="font-size:0.85rem; color:#FFFFFF; margin: 0 0 8px 0;">Background Photos</p>
            <div style="display:flex; gap:12px; align-items:center; margin-bottom: 10px;">
                <button id="uploadPhotoBtn" onclick="document.getElementById('photoInput').click()" class="action-btn" style="background:#3b82f6; border:none; padding:8px 16px;">📷 Add</button>
                <input type="file" id="photoInput" multiple accept="image/*" style="display:none;" />
            </div>
            <div id="photoList" style="display:flex; flex-direction:column; gap:6px; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="grid-layout" id="dashboardGrid">
        <div id="pageWrapper"></div>
    </div>

<script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => { 
        e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; 
    });
    installBtn.addEventListener('click', () => { 
        if (deferredPrompt) { 
            deferredPrompt.prompt(); 
            deferredPrompt.userChoice.then((cr) => { 
                if (cr.outcome === 'accepted') installBtn.style.display = 'none'; 
                deferredPrompt = null; 
            }); 
        } 
    });
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Registration failed', err));

    let wakeLockInstance = null;
    let autoPageRotationInterval = null;
    let itemsPerPage = 4; 
    let userLat = null, userLng = null;
    let currentPageIndex = 0; 
    let autoBusPageCount = 0; 
    let compiledRouteArray = [], stockData = [], newsData = [], Data = [], forecastData = [], hourlyData = [], pagesQueue = [];
    const TIME_PER_PAGE_MS = 8000; 

    function getDynamicItemsPerPage() {
        if (window.innerWidth <= 600) return 3;
        if (window.innerHeight <= 500) return 2;
        return 4;
    }

    window.addEventListener('DOMContentLoaded', async () => {
        setLayoutSize(localStorage.getItem('layoutSize') || 'large');
        renderSettingsStockList();
        
        initClockAndDateLabels();
        await initIndexedDBEngine();
        await renderSettingsPhotoList();
        await loadAndRenderBackgroundSlideshow();
        
        // Launch all network fetchers in parallel without blocking!
        fetchHKOWeather(); 
        fetchForecast();
        fetchStocks();
        fetchNews();
        fetchTrafficNews();
        fetchHourlyWeather();
        acquireDeviceLocation(); 

        setInterval(() => { 
            fetchHKOWeather(); fetchForecast(); fetchStocks(); fetchNews(); fetchTrafficNews(); fetchHourlyWeather();
        }, 60000); 

        setInterval(async () => {
            if(userLat && userLng) await fetchAndAggregateRouteFeeds();
        }, 60000); 

        window.addEventListener('resize', () => {
            const newCount = getDynamicItemsPerPage();
            if (newCount !== itemsPerPage) {
                itemsPerPage = newCount;
                rebuildQueueAndRender();
            }
        });

        requestWakeLock();
    });

    function initClockAndDateLabels() {
        const update = () => {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            const daysTc = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const daysEn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const monthsEn = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            
            const tcDate = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${daysTc[now.getDay()]})`;
            const enDate = `${now.getDate()} ${monthsEn[now.getMonth()]} ${now.getFullYear()} (${daysEn[now.getDay()]})`;
            const fullDateString = `${tcDate} \u00A0\u00A0 ${enDate}`;

            document.getElementById('liveTime').textContent = timeString;
            document.getElementById('liveDate').textContent = fullDateString;

            const clt = document.getElementById('centerLiveTime');
            if(clt) clt.textContent = timeString;
            const cld = document.getElementById('centerLiveDate');
            if(cld) cld.textContent = fullDateString;
        };
        update();
        setInterval(update, 1000);
    }

    function setLayoutSize(size) {
        const root = document.documentElement;
        document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
        
        if (size === 'small') { 
            root.style.fontSize = '12px'; document.getElementById('btnSizeSmall').classList.add('active'); 
        } else if (size === 'medium') { 
            root.style.fontSize = '15px'; document.getElementById('btnSizeMedium').classList.add('active'); 
        } else { 
            root.style.fontSize = '18px'; document.getElementById('btnSizeLarge').classList.add('active'); size = 'large'; 
        }
        
        localStorage.setItem('layoutSize', size);
        setTimeout(() => { rebuildQueueAndRender(); }, 350); 
    }

    let currentWarnHTML = '';

    const warnMap = {
        'WFIREY': 'firey', 'WFIRER': 'firer', 'WRAINA': 'raina', 'WRAINR': 'rainr', 'WRAINB': 'rainb',
        'TC1': 'tc1', 'TC3': 'tc3', 'TC8NE': 'tc8ne', 'TC8NW': 'tc8nw', 'TC8SE': 'tc8se', 'TC8SW': 'tc8sw', 'TC9': 'tc9', 'TC10': 'tc10',
        'WCOLD': 'cold', 'WHOT': 'vhot', 'WFROST': 'frost', 'WL': 'landslip', 'WTS': 'ts', 'WMSGNL': 'sms', 'WTCSW': 'tcsw',
        'WFNTSA': 'ntfl' 
    };

    async function fetchHKOWeather() {
        try {
            const weatherRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r => r.json());
            if (weatherRes && weatherRes.icon && weatherRes.icon.length > 0) {
                const iconSrc = `https://www.hko.gov.hk/images/wxicon/pic${weatherRes.icon[0]}.png`;
                document.getElementById('weatherIcon').src = iconSrc; 
                document.getElementById('weatherIcon').style.display = 'block';
            }
            if (weatherRes && weatherRes.temperature && weatherRes.temperature.data) {
                const obsTemp = weatherRes.temperature.data.find(t => t.place === "香港天文台") || weatherRes.temperature.data[0];
                if (obsTemp) document.getElementById('temperature').textContent = `${obsTemp.value}°C`;
            }

            const warnRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc').then(r => r.json());
            const warningContainer = document.getElementById('weatherWarnings');
            warningContainer.innerHTML = ''; currentWarnHTML = '';

            if (warnRes && Object.keys(warnRes).length > 0) {
                Object.keys(warnRes).forEach(key => {
                    const warn = warnRes[key];
                    if (warn && warn.name) {
                        const actualCode = warn.code || key; 
                        const iconName = warnMap[actualCode] || actualCode.toLowerCase();
                        const imgSrc = `https://www.hko.gov.hk/tc/wxinfo/dailywx/images/${iconName}.gif`;
                        
                        const img = document.createElement('img');
                        img.src = imgSrc; img.style.height = '36px'; img.style.width = 'auto'; img.title = warn.name;
                        
                        img.onerror = function() {
                            this.style.display = 'none'; 
                            const span = document.createElement('span'); span.textContent = warn.name; 
                            span.style.color = '#FFFFFF'; span.style.fontSize = '0.8rem';
                            warningContainer.appendChild(span);
                        };
                        warningContainer.appendChild(img);
                        currentWarnHTML += `<img src="${imgSrc}" style="height:clamp(25px, 5vw, 45px); width:auto;" title="${warn.name}" />`;
                    }
                });
            }
        } catch (e) {} rebuildQueueAndRender(); 
    }

    
    async function fetchHourlyWeather() {
        try {
            const lat = userLat || 22.3193;
            const lng = userLng || 114.1694;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,precipitation_probability,weather_code&forecast_hours=12&timezone=Asia%2FHong_Kong`;
            const res = await fetch(url, { cache: "no-store" }).then(r => r.json());
            if (res && res.hourly && res.hourly.time) {
                const now = new Date();
                const currentHourISO = now.toISOString().slice(0, 13);
                let mappedHours = [];
                for (let i = 0; i < res.hourly.time.length; i++) {
                    const timeStr = res.hourly.time[i];
                    const hourDate = new Date(timeStr);
                    if (hourDate.getTime() >= now.getTime() - 3600000) {
                        const temp = Math.round(res.hourly.temperature_2m[i]);
                        const rain = res.hourly.precipitation_probability[i];
                        const code = res.hourly.weather_code[i];
                        
                        let icon = "☀️";
                        if ([1, 2].includes(code)) icon = "🌤️";
                        else if (code === 3) icon = "☁️";
                        else if ([45, 48].includes(code)) icon = "🌫️";
                        else if ([51, 53, 55, 56, 57].includes(code)) icon = "🌦️";
                        else if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) icon = "🌧️";
                        else if ([95, 96, 99].includes(code)) icon = "⚡";
                        
                        let displayTime = hourDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                        if (mappedHours.length === 0) displayTime = "現在 Now";
                        
                        mappedHours.push({
                            time: displayTime,
                            temp: temp,
                            rain: rain,
                            icon: icon
                        });
                    }
                }
                if (mappedHours.length > 0) {
                    hourlyData = mappedHours.slice(0, 6);
                    rebuildQueueAndRender();
                }
            }
        } catch (e) {}
    }

    async function fetchForecast() {
        try {
            const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc').then(r => r.json());
            if (res && res.weatherForecast) {
                forecastData = res.weatherForecast;
                rebuildQueueAndRender();
            }
        } catch(e) {}
    }

    function getSavedStocks() {
        let saved = localStorage.getItem('inhome_stocks');
        if (!saved || JSON.parse(saved).length === 0) {
            const defaults = ['0005.HK', '2800.HK', 'AAPL'];

    function extractTimeAndTitle(text, pubDate = '') {
        const cleanText = text.replace(/\s+/g, ' ').trim();
        if (cleanText.length < 8 || cleanText.includes('Copyright') || cleanText.includes('版權所有') || cleanText.includes('香港電台網站')) {
            return null;
        }

        const dtRegex = /(\d{4}[-/年]\d{1,2}[-/月]\d{1,2}[日]?)\s*(?:HKT\s*)?(\d{1,2}:\d{2}(?:\:\d{2})?)/i;
        const match = cleanText.match(dtRegex);

        let dateStr = '';
        let timeStr = '';
        let titleStr = cleanText;
        let itemDt = null;
        const now = new Date();

        if (match) {
            const dPart = match[1].replace('年', '-').replace('月', '-').replace('/', '-').replace('日', '');
            const tPart = match[2].substring(0, 5); // HH:MM
            const dParts = dPart.split('-').map(p => parseInt(p, 10));
            const tParts = tPart.split(':').map(p => parseInt(p, 10));

            if (dParts.length === 3 && !isNaN(dParts[0]) && !isNaN(dParts[1]) && !isNaN(dParts[2])) {
                const y = dParts[0];
                const m = String(dParts[1]).padStart(2, '0');
                const d = String(dParts[2]).padStart(2, '0');
                dateStr = `${y}-${m}-${d}`;
                timeStr = `${String(tParts[0]).padStart(2, '0')}:${String(tParts[1]).padStart(2, '0')}`;
                itemDt = new Date(y, dParts[1] - 1, dParts[2], tParts[0], tParts[1], 0);
            }

            titleStr = cleanText.replace(match[0], '').trim();
            titleStr = titleStr.replace(/\bHKT\b/gi, '').trim();
            titleStr = titleStr.replace(/^[-,.:/|–—\s]+|[-,.:/|–—\s]+$/g, '').trim();
            titleStr = titleStr.replace(/^交通消息[:：\s]*/i, '').trim();
        } else if (pubDate) {
            const parsedD = new Date(pubDate);
            if (!isNaN(parsedD.getTime())) {
                itemDt = parsedD;
                const y = parsedD.getFullYear();
                const m = String(parsedD.getMonth() + 1).padStart(2, '0');
                const d = String(parsedD.getDate()).padStart(2, '0');
                dateStr = `${y}-${m}-${d}`;
                timeStr = parsedD.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            }
            titleStr = cleanText.replace(/^交通消息[:：\s]*/i, '').replace(/^[-,.:/|–—\s]+|[-,.:/|–—\s]+$/g, '').trim();
        }

        if (!itemDt) {
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            dateStr = `${y}-${m}-${d}`;
            timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            itemDt = now;
        }

        // Filter: News should be within 4 hours (14400000 ms)
        const diffMs = now.getTime() - itemDt.getTime();
        const FOUR_HOURS_MS = 4 * 60 * 60 * 1000;

        if (diffMs > FOUR_HOURS_MS || diffMs < -3600000) {
            return null; // Ignore old reports > 4 hours
        }

        if (titleStr.length <= 4 || /^[\d\s\-/:.,HKT年-月日]+$/i.test(titleStr)) {
            return null;
        }

        return {
            date: dateStr,
            time: timeStr,
            title: titleStr,
            timestamp: itemDt.getTime()
        };
    }

function parseTrafficHtml(htmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");
        const results = [];
        
        // Remove common header/nav/footer containers to avoid capturing UI text
        const ignoreSelectors = 'nav, header, footer, .nav, .menu, .header, .footer, script, style, .sidebar, #header, #footer, #sidebar';
        doc.querySelectorAll(ignoreSelectors).forEach(el => el.remove());
        
        const candidates = Array.from(doc.body.querySelectorAll('li, tr, .item, .inner, p, div, article, td'));
        
        candidates.forEach(el => {
            const text = el.textContent.trim().replace(/\s+/g, ' ');
            
            // Strict length filtering to ignore labels and buttons
            if (text.length < 15 || text.length > 300) return;
            
            // Filter out common UI boilerplate keywords
            const lowerText = text.toLowerCase();
            const blacklist = ['copyright', '版權所有', '香港電台網站', '繁體', '簡體', 'english', 'home', 'news', 'contact', 'about', 'menu', 'navigation'];
            if (blacklist.some(term => lowerText.includes(term))) return;
            
            // Ensure the text actually matches a traffic report
            const res = extractTimeAndTitle(text);
            if (res && res.title && res.title.length > 8) {
                // Avoid duplicates by comparing titles
                if (!results.some(r => r.title.includes(res.title) || res.title.includes(r.title))) {
                    results.push(res);
                }
            }
        });
        return results;
    }

    async function fetchTrafficNews() {
        const targetUrl = 'https://programme.rthk.hk/channel/radio/trafficnews/index.php';
        const proxyUrls = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`
        ];

        // Method 1: Scrape official RTHK Radio Traffic News Website directly via proxy
        for (const proxyUrl of proxyUrls) {
            try {
                const htmlText = await fetch(proxyUrl, { cache: "no-store" }).then(r => r.text());
                if (htmlText && htmlText.length > 500) {
                    const parsedItems = parseTrafficHtml(htmlText);
                    if (parsedItems.length > 0) {
                        trafficData = parsedItems.slice(0, 15);
                        rebuildQueueAndRender();
                        return;
                    }
                }
            } catch(e) {}
        }

        // Method 2: Fallback to official RTHK Traffic RSS Feeds ONLY
        const rthkFeeds = [
            'https://news.rthk.hk/rthk/ch/rss/traffic.xml',
            'https://rthk.hk/rthk/news/rss/c_trafficnews.xml'
        ];

        for (const feed of rthkFeeds) {
            try {
                const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`;
                const res = await fetch(rssUrl, { cache: "no-store" }).then(r => r.json());
                if (res && res.items && res.items.length > 0) {
                    const validItems = res.items.map(item => extractTimeAndTitle(item.title || item.description || '', item.pubDate || '')).filter(t => t && t.title && t.title.length > 5);
                    if (validItems.length > 0) {
                        trafficData = validItems.slice(0, 15);
                        rebuildQueueAndRender();
                        return;
                    }
                }
            } catch(e) {}
        }

        for (const feed of rthkFeeds) {
            try {
                const xmlUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(feed)}`;
                const res = await fetch(xmlUrl, { cache: "no-store" }).then(r => r.text());
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(res, "text/xml");
                const items = Array.from(xmlDoc.querySelectorAll("item"));
                if (items.length > 0) {
                    const validItems = items.map(item => {
                        const titleNode = item.querySelector("title");
                        const dateNode = item.querySelector("pubDate") || item.querySelector("date");
                        const titleText = titleNode ? titleNode.textContent.trim() : "";
                        const dateText = dateNode ? dateNode.textContent.trim() : "";
                        return extractTimeAndTitle(titleText, dateText);
                    }).filter(t => t && t.title && t.title.length > 5);
                    if (validItems.length > 0) {
                        trafficData = validItems.slice(0, 15);
                        rebuildQueueAndRender();
                        return;
                    }
                }
            } catch(e) {}
        }
    }

    function acquireDeviceLocation() {
        if (!navigator.geolocation) { rebuildQueueAndRender(); return; }
        navigator.geolocation.getCurrentPosition(
            async (pos) => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; await fetchAndAggregateRouteFeeds(); await fetchHourlyWeather(); }, 
            () => { rebuildQueueAndRender(); }, { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    async function fetchAndAggregateRouteFeeds() {
        try {
            const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/stop").then(r => r.json());
            const allStops = res.data || []; let cachedStopMap = {};

            const nearbyIds = allStops.filter(stop => {
                const dist = calculateDist(userLat, userLng, parseFloat(stop.lat), parseFloat(stop.long));
                if (dist <= 350) { cachedStopMap[stop.stop] = { name_tc: stop.name_tc, name_en: stop.name_en, distance: dist }; return true; }
                return false;
            }).map(s => s.stop);

            if (nearbyIds.length === 0) { compiledRouteArray = []; rebuildQueueAndRender(); return; }

            const aggregatedRoutes = {}; const routeDistances = {};

            const fetchPromises = nearbyIds.map(async (stopId) => {
                try {
                    const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`).then(r => r.json());
                    (etaRes.data || []).forEach(item => {
                        if (!item.eta) return;
                        const co = item.co || "KMB"; const routeKey = `${co}_${item.route}_${item.dir}`; 
                        const dist = cachedStopMap[stopId] ? cachedStopMap[stopId].distance : 9999;
                        if (routeDistances[routeKey] !== undefined && routeDistances[routeKey] < dist) return;
                        if (routeDistances[routeKey] !== undefined && routeDistances[routeKey] > dist) {
                            for (const k in aggregatedRoutes) { if (k.startsWith(routeKey + "_")) delete aggregatedRoutes[k]; }
                        }
                        routeDistances[routeKey] = dist; const finalKey = `${routeKey}_${stopId}`;
                        if (!aggregatedRoutes[finalKey]) {
                            aggregatedRoutes[finalKey] = { company: co, route: item.route, dest_tc: item.dest_tc, dest_en: item.dest_en, stopDistance: dist, stopNameTc: cachedStopMap[stopId].name_tc, stopNameEn: cachedStopMap[stopId].name_en, arrivals: [] };
                        }
                        if (!aggregatedRoutes[finalKey].arrivals.some(a => a.eta === item.eta)) { aggregatedRoutes[finalKey].arrivals.push({ eta: item.eta }); }
                    });
                } catch(e) {}
            });

            await Promise.all(fetchPromises);
            compiledRouteArray = Object.values(aggregatedRoutes).map(line => { 
                line.arrivals.sort((a, b) => new Date(a.eta) - new Date(b.eta)); return line; 
            }).sort((a, b) => a.stopDistance - b.stopDistance);
            rebuildQueueAndRender();
        } catch (e) {}
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function rebuildQueueAndRender() {
        itemsPerPage = getDynamicItemsPerPage();
        pagesQueue = [];
        pagesQueue.push({ type: 'clock' });

        if (compiledRouteArray.length > 0) {
            const totalBusPages = Math.ceil(compiledRouteArray.length / itemsPerPage);
            for (let i = 0; i < totalBusPages; i++) {
                pagesQueue.push({ type: 'bus', data: compiledRouteArray.slice(i * itemsPerPage, (i + 1) * itemsPerPage) });
            }
        }

        if (hourlyData && hourlyData.length > 0) pagesQueue.push({ type: 'hourly', data: hourlyData });
        if (forecastData && forecastData.length > 0) pagesQueue.push({ type: 'forecast', data: forecastData.slice(0, 5) });
        stockData.forEach(stk => pagesQueue.push({ type: 'stock', data: stk }));
        
        // Always include traffic report page in rotation queue!
        const trafficPerPage = Math.max(2, Math.min(itemsPerPage, 3));
        if (trafficData && trafficData.length > 0) {
            for (let i = 0; i < trafficData.length; i += trafficPerPage) {
                pagesQueue.push({ type: 'traffic', data: trafficData.slice(i, i + trafficPerPage) });
            }
        } else {
            // Guaranteed fallback when there are no special traffic reports within 4 hours
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            pagesQueue.push({ type: 'traffic', data: [{ date: dateStr, time: timeStr, title: '目前全港交通大致正常 / 過去 4 小時內暫無特別交通報告 No special traffic reports within the last 4 hours.' }] });
        }

        // Cap news at a maximum of 4 pages with exactly 3 headlines each!
        const newsPerPage = 3;
        if (newsData.length > 0) {
            const cappedNews = newsData.slice(0, 12);
            for (let i = 0; i < cappedNews.length; i += newsPerPage) pagesQueue.push({ type: 'news', data: cappedNews.slice(i, i + newsPerPage) });
        } else {
            // Placeholder/loading state when news feed is loading or temporarily blocked
            pagesQueue.push({ type: 'news', data: ["載入即時新聞中... Loading RTHK / Gov News...", "正在連接新聞通訊社... Please wait...", "如長時間未能顯示，將於下次自動更新時重試。"] });
        }

        if (currentPageIndex >= pagesQueue.length) currentPageIndex = 0;
        renderActivePage();
        
        if (!autoPageRotationInterval) autoPageRotationInterval = setInterval(autoRotate, TIME_PER_PAGE_MS);
    }

            wrapper.innerHTML = `
                <div class="center-layout" style="justify-content: center; gap: 12px; width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px 20px;">
                    <div style="font-size: 1.5rem; font-weight: 600; color: #FCA5A5; text-align: left; width: 100%; margin-bottom: 4px; padding-left: 10px; text-shadow: var(--text-glow);">特別交通報告 Special Traffic Report</div>
                    ${trafficHtml}
                </div>`;
        }
        else if (page.type === 'news') {
            mainHeader.style.opacity = '1';
            let titlesHtml = page.data.map(t => `<div class="news-title-row">${t}</div>`).join('');
            wrapper.innerHTML = `
                <div class="center-layout" style="justify-content: center; gap: 12px; width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px 20px;">
                    ${titlesHtml}
                </div>`;
        }
        else if (page.type === 'bus') {
            mainHeader.style.opacity = '1';
            page.data.forEach(line => {
                const card = document.createElement('div'); card.className = 'kiosk-card-route';
                let identHtml = `
                    <div class="route-ident-block">
                        <div class="route-badge" style="text-shadow: var(--text-glow);">${line.route}</div>
                        <div class="dest-col">
                            <div class="dest-tc">往 ${line.dest_tc}</div>
                            <div class="dest-en">To ${line.dest_en}</div>
                            <div class="stop-spec-box">${line.stopNameTc} (${line.stopNameEn})</div>
                        </div>
                    </div>
                `;
                
                let timelineHtml = `<div class="arrivals-timeline" onclick="event.stopPropagation()">`;
                const activeArrivals = line.arrivals.slice(0, 3);

                if (activeArrivals.length === 0) {
                    timelineHtml += `<div style="color:var(--text-main); font-size:1.1rem; font-style:italic; font-weight:600; text-shadow:var(--text-glow);">No departures scheduled / 沒有班次</div>`;
                } else {
                    activeArrivals.forEach((arrival, idx) => {
                        const diff = Math.max(0, Math.floor((new Date(arrival.eta) - new Date()) / 1000 / 60));
                        const displayClock = new Date(arrival.eta).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                        let nodeClass = "arrival-node"; if (idx === 0 && diff <= 3) nodeClass += " imminent";
                        const minuteString = diff === 0 ? "到站中 Arriving" : `${diff} 分鐘 Mins`;
                        
                        timelineHtml += `
                            <div class="${nodeClass}">
                                <span class="node-mins">${minuteString}</span>
                                <span class="node-clock">${displayClock}</span>
                            </div>
                        `;
                    });
                }
                timelineHtml += `</div>`; card.innerHTML = identHtml + timelineHtml; wrapper.appendChild(card);
            });
        }
    }

    function transitionToNextPage(targetIndex = null) {
        if(pagesQueue.length <= 1) return;
        const wrapper = document.getElementById('pageWrapper'); wrapper.classList.add('dimmed'); 
        setTimeout(() => { 
            currentPageIndex = targetIndex !== null ? targetIndex : (currentPageIndex + 1) % pagesQueue.length; 
            renderActivePage(); wrapper.classList.remove('dimmed'); 
        }, 400);
    }

    function autoRotate() {
        if(pagesQueue.length <= 1) return;
        let nextIdx = (currentPageIndex + 1) % pagesQueue.length;
        
        if (pagesQueue[currentPageIndex].type === 'bus') {
            autoBusPageCount++;
            if (autoBusPageCount >= 4 && pagesQueue[nextIdx].type === 'bus') {
                while (pagesQueue[nextIdx].type === 'bus') {
                    nextIdx = (nextIdx + 1) % pagesQueue.length;
                }
            }
        } else {
            autoBusPageCount = 0; 
        }
        transitionToNextPage(nextIdx);
    }

    function handleGlobalTap(event) {
        if (pagesQueue.length <= 1) return;
        if (autoPageRotationInterval) clearInterval(autoPageRotationInterval);
        
        autoBusPageCount = 0; 
        
        const firstBusIndex = pagesQueue.findIndex(p => p.type === 'bus');
        if (pagesQueue[currentPageIndex].type !== 'bus' && firstBusIndex !== -1) {
            transitionToNextPage(firstBusIndex);
        } else {
            transitionToNextPage();
        }
        autoPageRotationInterval = setInterval(autoRotate, TIME_PER_PAGE_MS);
    }

    function toggleSettingsDrawer() {
        const drawer = document.getElementById('settingsDrawer');
        drawer.style.display = drawer.style.display === 'block' ? 'none' : 'block';
    }

    let dbInstance = null, slideshowIntervalId = null, blobUrlsToClean = [];
    
    function initIndexedDBEngine() { 
        return new Promise((resolve) => { 
            const req = indexedDB.open("BusKioskDB", 1); 
            req.onupgradeneeded = e => { if(!e.target.result.objectStoreNames.contains("bgs")) e.target.result.createObjectStore("bgs", {keyPath: "id", autoIncrement: true}); }; 
            req.onsuccess = e => { dbInstance = e.target.result; resolve(); }; req.onerror = () => resolve(); 
        }); 
    }

    function saveBlobToIndexedDB(blob) { 
        return new Promise((res, rej) => { 
            if(!dbInstance) return rej(); const tx = dbInstance.transaction("bgs", "readwrite"); 
            tx.objectStore("bgs").add({blob: blob}); tx.oncomplete = res; 
        }); 
    }

    function getAllBlobsFromIndexedDB() { 
        return new Promise(res => { 
            if(!dbInstance) return res([]); const req = dbInstance.transaction("bgs", "readonly").objectStore("bgs").getAll(); 
            req.onsuccess = () => res(req.result||[]); req.onerror = () => res([]); 
        }); 
    }

    function deleteBlobFromIndexedDB(id) {
        return new Promise((res, rej) => {
            if(!dbInstance) return rej(); const tx = dbInstance.transaction("bgs", "readwrite");
            tx.objectStore("bgs").delete(id); tx.oncomplete = res;
        });
    }

    async function renderSettingsPhotoList() {
        const records = await getAllBlobsFromIndexedDB();
        const list = document.getElementById('photoList'); list.innerHTML = '';
        if (records.length === 0) list.innerHTML = '<div style="font-size:0.85rem; color:#FFFFFF;">No custom photos. 5 GitHub defaults active.</div>';
        else {
            records.forEach((rec, idx) => {
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; background:rgba(0,0,0,0.2); padding:6px 12px; border-radius:6px; font-size:0.9rem; align-items:center; color:white;">
                        <span>Custom Photo ${idx + 1}</span>
                        <button onclick="deletePhoto(${rec.id})" style="background:none; border:none; color:#ef4444; cursor:pointer; font-weight:600;">X</button>
                    </div>
                `;
            });
        }
    }

    async function deletePhoto(id) { await deleteBlobFromIndexedDB(id); await renderSettingsPhotoList(); await loadAndRenderBackgroundSlideshow(); }

    async function loadAndRenderBackgroundSlideshow() {
        const container = document.getElementById('bgSlideContainer'); container.innerHTML = '';
        if(slideshowIntervalId) clearInterval(slideshowIntervalId);
        blobUrlsToClean.forEach(URL.revokeObjectURL); blobUrlsToClean = [];
        
        const records = await getAllBlobsFromIndexedDB();
        
        // Includes 5 default GitHub backgrounds
        const sources = records.length > 0 ? records.map(r => { const u = URL.createObjectURL(r.blob); blobUrlsToClean.push(u); return u; }) : [
            "./default-bg-1.jpg",
            "./default-bg-2.jpg",
            "./default-bg-3.jpg",
            "./default-bg-4.jpg",
            "./default-bg-5.jpg"
        ];
        
        sources.forEach((s, i) => { 
            const d = document.createElement('div'); d.className = `bg-slide ${i===0?'active':''}`; 
            d.style.backgroundImage = `url('${s}')`; container.appendChild(d); 
        });
        
        let bgIndex = 0; 
        slideshowIntervalId = setInterval(() => { 
            const s = document.querySelectorAll('.bg-slide'); if(s.length <= 1) return; 
            s[bgIndex].classList.remove('active'); bgIndex = (bgIndex + 1) % s.length; s[bgIndex].classList.add('active'); 
        }, 12000);
    }

    document.getElementById('photoInput').addEventListener('change', async e => {
        const f = Array.from(e.target.files); if(!f.length) return; 
        const uploadBtn = document.getElementById('uploadPhotoBtn');
        const oldText = uploadBtn.textContent; uploadBtn.textContent = "Processing...";
        
        for(let file of f) { 
            try { 
                const b = await new Promise((res,rej) => { 
                    const r = new FileReader(); r.onload = ev => { 
                        const i = new Image(); i.onload = () => { 
                            const c = document.createElement('canvas'); c.width = Math.min(1920, i.width); c.height = Math.min(1080, i.height); 
                            c.getContext('2d').drawImage(i,0,0,c.width,c.height); c.toBlob(res,'image/jpeg',0.85); 
                        }; i.src = ev.target.result; 
                    }; r.readAsDataURL(file); 
                }); 
                await saveBlobToIndexedDB(b); 
            } catch(e){} 
        }
        
        uploadBtn.textContent = oldText; await renderSettingsPhotoList(); await loadAndRenderBackgroundSlideshow();
    });

    async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLockInstance = await navigator.wakeLock.request('screen'); } } catch (e) {} }
</script>
